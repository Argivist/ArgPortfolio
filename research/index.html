<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/nav.css">
    <link rel="stylesheet" href="../css/research.css">

    <title>Hutton Amison-Addy - Research</title>

    <style>
        body {
            background-color: #f9f9f9;
            color: #333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .under_construction {
            text-align: center;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 600px;
        }

        .under_construction h1 {
            font-size: 28px;
            color: #444;
            margin-bottom: 15px;
        }

        .construction-icon {
            width: 100px;
            height: auto;
            margin: 15px 0;
        }

        .desc {
            font-size: 16px;
            color: #666;
            line-height: 1.5;
        }

        .go_back {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .go_back a {
            text-decoration: none;
            color: #333;
            font-size: 14px;
            padding: 5px 10px;
            display: flex;
            align-items: center;
        }

        .back-icon {
            width: 16px;
            height: 16px;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="go_back">
        <img src="https://cdn-icons-png.flaticon.com/512/93/93634.png" alt="Back Icon" class="back-icon">
        <a href="../index.html">← Back to Home</a>
    </div>
    <div class="under_construction">
        <h1>Under Construction</h1>
        <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png" alt="Under Construction Icon"
            class="construction-icon">
        <p class="desc">This section is currently under construction. Please check back later for updates.</p>

    </div>
</body>

</html>
